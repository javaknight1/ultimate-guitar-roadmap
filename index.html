:</strong> Most home studio needs</li>\n</ul>\n<p><strong>Mid-Range ($200-$300):</strong>\n<strong>Universal Audio Volt 2</strong></p>\n<ul>\n<li>2 inputs</li>\n<li>Vintage preamp mode (adds analog warmth)</li>\n<li>Built-in compressor</li>\n<li><strong>Best for:</strong> Better sound quality, easy &quot;pro tone&quot;</li>\n</ul>\n<p><strong>PreSonus AudioBox iTwo</strong></p>\n<ul>\n<li>2 inputs</li>\n<li>iPad compatible</li>\n<li>Solid build quality</li>\n</ul>\n<p><strong>Professional ($400-$800):</strong>\n<strong>Universal Audio Apollo Twin</strong></p>\n<ul>\n<li>2 inputs</li>\n<li>Built-in DSP processing (real-time effects with no latency)</li>\n<li>Unison preamps (emulate classic hardware)</li>\n<li><strong>Best for:</strong> Professional quality, future-proof</li>\n</ul>\n<p><strong>Audient iD14</strong></p>\n<ul>\n<li>2 inputs, excellent preamps</li>\n<li>Great converters</li>\n<li>ScrollControl feature (volume knob controls DAW)</li>\n</ul>\n<hr>\n<p><strong>MY RECOMMENDATION FOR YOU:</strong></p>\n<p>Start with <strong>Focusrite Scarlett 2i2</strong> ($170-$200)</p>\n<p><strong>Why?</strong></p>\n<ul>\n<li>2 inputs (record guitar + vocal at once)</li>\n<li>Industry standard (used by millions)</li>\n<li>Reliable drivers (works flawlessly with all DAWs)</li>\n<li>Expandable (if you need more inputs later, you can add ADAT expanders)</li>\n<li>Resale value holds well</li>\n</ul>\n<hr>\n<p><strong>2. MICROPHONE</strong></p>\n<p><strong>Microphone Types:</strong></p>\n<p><strong>Dynamic Microphones:</strong></p>\n<ul>\n<li>Work like a speaker in reverse (moving diaphragm creates electrical signal)</li>\n<li>Durable, can handle high volume</li>\n<li>Don&#39;t require phantom power</li>\n<li><strong>Best for:</strong> Live performance, loud sources (amps, drums)</li>\n<li><strong>Example:</strong> Shure SM57, SM58</li>\n</ul>\n<p><strong>Condenser Microphones:</strong></p>\n<ul>\n<li>Use capacitor plates (more sensitive)</li>\n<li>Require phantom power (+48V from interface)</li>\n<li>Capture more detail and high frequencies</li>\n<li>More fragile</li>\n<li><strong>Best for:</strong> Studio vocals, acoustic guitar, detailed recording</li>\n<li><strong>Example:</strong> Audio-Technica AT2020, Rode NT1</li>\n</ul>\n<p><strong>Ribbon Microphones:</strong></p>\n<ul>\n<li>Delicate metal ribbon responds to sound</li>\n<li>Very fragile (don&#39;t use phantom power!)</li>\n<li>Smooth, vintage sound</li>\n<li><strong>Best for:</strong> Advanced applications (guitar cabs, strings, specialized use)</li>\n<li>Expensive</li>\n</ul>\n<hr>\n<p><strong>MICROPHONE POLAR PATTERNS:</strong></p>\n<p><strong>Polar Pattern</strong> = the direction(s) from which the mic picks up sound</p>\n<p><strong>Cardioid (Most Common):</strong></p>\n<ul>\n<li>Picks up sound from the front</li>\n<li>Rejects sound from the sides and rear</li>\n<li>Shaped like a heart (hence &quot;cardio&quot;)</li>\n<li><strong>Use:</strong> Vocals, guitar, most home recording</li>\n</ul>\n<p><strong>Omnidirectional:</strong></p>\n<ul>\n<li>Picks up sound equally from all directions</li>\n<li><strong>Use:</strong> Room ambience, group recordings</li>\n</ul>\n<p><strong>Figure-8 (Bidirectional):</strong></p>\n<ul>\n<li>Picks up front and back, rejects sides</li>\n<li><strong>Use:</strong> Two people facing each other, advanced techniques</li>\n</ul>\n<p><strong>For Home Recording:</strong> Always use cardioid. It isolates the source and rejects room noise.</p>\n<hr>\n<p><strong>RECOMMENDED MICROPHONES:</strong></p>\n<p><strong>Budget ($100-$150):</strong>\n<strong>Audio-Technica AT2020</strong></p>\n<ul>\n<li>Large diaphragm condenser</li>\n<li>Cardioid pattern</li>\n<li>Great on vocals and acoustic guitar</li>\n<li><strong>Best starter mic</strong> - incredible value</li>\n</ul>\n<p><strong>MXL 770</strong></p>\n<ul>\n<li>Similar to AT2020</li>\n<li>Slightly brighter sound</li>\n<li>Even cheaper ($75-$100)</li>\n</ul>\n<p><strong>Mid-Range ($200-$400):</strong>\n<strong>Rode NT1-A</strong></p>\n<ul>\n<li>One of the quietest mics available (low self-noise)</li>\n<li>Extremely clear and detailed</li>\n<li>Comes with shock mount and pop filter</li>\n<li><strong>Industry favorite for home vocals</strong></li>\n</ul>\n<p><strong>Shure SM7B</strong> ($400)</p>\n<ul>\n<li>Dynamic mic (doesn&#39;t need phantom power)</li>\n<li>Used on countless hit records (Michael Jackson&#39;s &quot;Thriller&quot;)</li>\n<li>Rejects room noise excellently</li>\n<li>Requires a lot of gain (may need additional preamp/cloudlifter)</li>\n</ul>\n<p><strong>Professional ($500-$1,000+):</strong>\n<strong>Neumann TLM 102</strong></p>\n<ul>\n<li>Legendary brand</li>\n<li>Incredibly clear and accurate</li>\n<li>Small diaphragm, great for tight spaces</li>\n</ul>\n<p><strong>Mojave MA-200</strong></p>\n<ul>\n<li>Tube condenser</li>\n<li>Warm, vintage character</li>\n<li>Great on vocals</li>\n</ul>\n<hr>\n<p><strong>MY RECOMMENDATION FOR YOU:</strong></p>\n<p>Start with <strong>Audio-Technica AT2020</strong> ($100)</p>\n<p><strong>Why?</strong></p>\n<ul>\n<li>Versatile (vocals, acoustic guitar, room mics)</li>\n<li>Affordable but professional sound</li>\n<li>Durable enough for home use</li>\n<li>You&#39;ll use this mic for years even as you upgrade other gear</li>\n</ul>\n<p><strong>Additional Accessories Needed:</strong></p>\n<ul>\n<li><strong>Mic Stand:</strong> Any standard boom stand ($20-$40)</li>\n<li><strong>Pop Filter:</strong> Reduces plosives (P and B sounds) ($10-$20)</li>\n<li><strong>Shock Mount:</strong> Isolates mic from vibrations (often included, or $20-$40)</li>\n</ul>\n<hr>\n<p><strong>3. HEADPHONES</strong></p>\n<p><strong>Why Headphones Matter:</strong></p>\n<p>In a home studio, you can&#39;t always use speakers (thin walls, neighbors, late night recording). Headphones are essential for:</p>\n<ul>\n<li>Monitoring while recording (so your mic doesn&#39;t pick up speaker sound)</li>\n<li>Mixing (hearing details clearly)</li>\n<li>Reference checking</li>\n</ul>\n<p><strong>Types of Headphones:</strong></p>\n<p><strong>Closed-Back:</strong></p>\n<ul>\n<li>Ear cups are sealed</li>\n<li>Isolates outside noise</li>\n<li>No sound leakage</li>\n<li><strong>Best for:</strong> Recording (prevents mic from picking up headphone bleed)</li>\n</ul>\n<p><strong>Open-Back:</strong></p>\n<ul>\n<li>Ear cups have openings</li>\n<li>More natural sound</li>\n<li>Sound leakage (others can hear what you&#39;re listening to)</li>\n<li><strong>Best for:</strong> Mixing (more accurate stereo image)</li>\n</ul>\n<p><strong>Semi-Open:</strong></p>\n<ul>\n<li>Hybrid design</li>\n<li>Compromise between closed and open</li>\n</ul>\n<hr>\n<p><strong>RECOMMENDED HEADPHONES:</strong></p>\n<p><strong>Budget ($50-$100):</strong>\n<strong>Audio-Technica ATH-M20x</strong> ($50)</p>\n<ul>\n<li>Closed-back</li>\n<li>Decent sound for the price</li>\n<li>Good for recording monitoring</li>\n</ul>\n<p><strong>Sony MDR-7506</strong> ($100)</p>\n<ul>\n<li>Industry standard for decades</li>\n<li>Closed-back</li>\n<li>Accurate, detailed</li>\n<li>Folds flat, very portable</li>\n<li><strong>Best budget choice</strong></li>\n</ul>\n<p><strong>Mid-Range ($100-$200):</strong>\n<strong>Audio-Technica ATH-M50x</strong> ($150)</p>\n<ul>\n<li>Closed-back</li>\n<li>Used in countless studios</li>\n<li>Great bass response</li>\n<li>Comfortable for long sessions</li>\n<li><strong>Most recommended for home producers</strong></li>\n</ul>\n<p><strong>Beyerdynamic DT 770 Pro</strong> ($150-$180)</p>\n<ul>\n<li>Closed-back</li>\n<li>Extremely comfortable</li>\n<li>Great isolation</li>\n<li>Very durable (German engineering)</li>\n</ul>\n<p><strong>Professional ($200-$400):</strong>\n<strong>Beyerdynamic DT 1990 Pro</strong> ($500)</p>\n<ul>\n<li>Open-back</li>\n<li>Reference-quality accuracy</li>\n<li>Replaceable parts</li>\n<li>Best for mixing (not recording)</li>\n</ul>\n<p><strong>Sennheiser HD 650</strong> ($350-$500)</p>\n<ul>\n<li>Open-back</li>\n<li>Legendary for mixing</li>\n<li>Incredibly natural sound</li>\n</ul>\n<hr>\n<p><strong>MY RECOMMENDATION FOR YOU:</strong></p>\n<p>Start with <strong>Audio-Technica ATH-M50x</strong> ($150)</p>\n<p><strong>Why?</strong></p>\n<ul>\n<li>Closed-back (good for recording)</li>\n<li>Accurate enough for mixing</li>\n<li>Comfortable for long sessions</li>\n<li>Industry standard (you can trust them)</li>\n<li>Will last 10+ years with care</li>\n</ul>\n<hr>\n<p><strong>4. STUDIO MONITORS (Optional - Not Essential Starting Out)</strong></p>\n<p><strong>What Are Studio Monitors?</strong></p>\n<p>Speakers designed for accurate sound reproduction (not hyped bass like consumer speakers).</p>\n<p><strong>Why You DON&#39;T Need Them Immediately:</strong></p>\n<ul>\n<li>Good headphones are enough to start</li>\n<li>Monitors require room treatment to sound accurate</li>\n<li>Expensive ($300-$1,000+ for a decent pair)</li>\n</ul>\n<p><strong>When to Buy Monitors:</strong></p>\n<ul>\n<li>After you&#39;ve made 10+ songs with headphones</li>\n<li>When you have budget ($400+ minimum)</li>\n<li>When you can treat your room acoustically</li>\n</ul>\n<p><strong>Recommended When Ready:</strong></p>\n<ul>\n<li><strong>KRK Rokit 5 G4</strong> ($150/each = $300/pair) - Popular beginner choice</li>\n<li><strong>Yamaha HS5</strong> ($200/each = $400/pair) - Very accurate, flat response</li>\n<li><strong>JBL 305P MkII</strong> ($150/each = $300/pair) - Great value</li>\n</ul>\n<hr>\n<p><strong>5. DAW (Digital Audio Workstation)</strong></p>\n<p><strong>What is a DAW?</strong></p>\n<p>The software where you record, edit, mix, and master music. Think of it as your &quot;virtual studio.&quot;</p>\n<p><strong>Popular DAWs:</strong></p>\n<p><strong>FREE OPTIONS:</strong></p>\n<p><strong>GarageBand (Mac Only)</strong></p>\n<ul>\n<li>Pre-installed on Mac</li>\n<li>Very beginner-friendly</li>\n<li>Limited compared to pro DAWs, but great to start</li>\n<li><strong>Best for:</strong> Absolute beginners on Mac</li>\n</ul>\n<p><strong>Reaper ($60 - technically not free, but unlimited trial)</strong></p>\n<ul>\n<li>Fully featured professional DAW</li>\n<li>Extremely lightweight and fast</li>\n<li>Steep learning curve</li>\n<li><strong>Best for:</strong> Budget-conscious, willing to learn</li>\n</ul>\n<p><strong>Cakewalk by BandLab (Windows - Free)</strong></p>\n<ul>\n<li>Full professional DAW (used to cost $500)</li>\n<li>Now completely free</li>\n<li>Feature-rich</li>\n</ul>\n<hr>\n<p><strong>PAID OPTIONS:</strong></p>\n<p><strong>Ableton Live ($99-$799)</strong></p>\n<ul>\n<li>Excellent for electronic music and loop-based production</li>\n<li>Great for live performance</li>\n<li>Unique workflow</li>\n<li><strong>Best for:</strong> Electronic, hip-hop, experimental</li>\n</ul>\n<p><strong>Logic Pro ($200 - Mac Only)</strong></p>\n<ul>\n<li>GarageBand&#39;s professional big brother</li>\n<li>Incredibly polished, easy to use</li>\n<li>Includes massive library of sounds and plugins</li>\n<li><strong>Best for:</strong> Mac users wanting professional features at reasonable price</li>\n</ul>\n<p><strong>Pro Tools ($99-$599)</strong></p>\n<ul>\n<li>Industry standard in professional studios</li>\n<li>Expensive, clunky interface</li>\n<li><strong>Best for:</strong> If you want to work in professional studios (they all use Pro Tools)</li>\n</ul>\n<p><strong>FL Studio ($99-$499)</strong></p>\n<ul>\n<li>Very popular for hip-hop and electronic</li>\n<li>Lifetime free updates (pay once, own forever)</li>\n<li>Pattern-based workflow</li>\n<li><strong>Best for:</strong> Beat-making, hip-hop, EDM</li>\n</ul>\n<p><strong>Studio One ($100-$400)</strong></p>\n<ul>\n<li>Modern, intuitive interface</li>\n<li>Great for beginners and pros</li>\n<li>Excellent stock plugins</li>\n<li><strong>Best for:</strong> Balanced features, ease of use, great value</li>\n</ul>\n<hr>\n<p><strong>MY RECOMMENDATION FOR YOU:</strong></p>\n<p><strong>If you&#39;re on Mac:</strong> Start with <strong>GarageBand (Free)</strong>, then upgrade to <strong>Logic Pro ($200)</strong> when you outgrow it.</p>\n<p><strong>If you&#39;re on Windows:</strong> Start with <strong>Reaper ($60 trial)</strong> or <strong>Cakewalk (Free)</strong>, then decide if you want to buy something else later.</p>\n<p><strong>Why These:</strong></p>\n<ul>\n<li>Low/no cost to start</li>\n<li>You&#39;ll learn fundamental concepts that transfer to any DAW</li>\n<li>Can always switch later (the concepts are universal)</li>\n</ul>\n<hr>\n<p><strong>YOUR COMPLETE STARTING GEAR LIST:</strong></p>\n<p><strong>Essential (Can&#39;t Record Without):</strong></p>\n<ul>\n<li><input disabled=\"\" type=\"checkbox\"> Audio Interface: Focusrite Scarlett 2i2 ($180)</li>\n<li><input disabled=\"\" type=\"checkbox\"> Microphone: Audio-Technica AT2020 ($100)</li>\n<li><input disabled=\"\" type=\"checkbox\"> Headphones: Audio-Technica ATH-M50x ($150)</li>\n<li><input disabled=\"\" type=\"checkbox\"> Mic Stand ($30)</li>\n<li><input disabled=\"\" type=\"checkbox\"> Pop Filter ($15)</li>\n<li><input disabled=\"\" type=\"checkbox\"> XLR Cable ($15)</li>\n<li><input disabled=\"\" type=\"checkbox\"> DAW: GarageBand/Reaper/Cakewalk (Free-$60)</li>\n</ul>\n<p><strong>Total: ~$490-$550</strong></p>\n<p><strong>Optional (Nice to Have Later):</strong></p>\n<ul>\n<li><input disabled=\"\" type=\"checkbox\"> Studio Monitors: Yamaha HS5 ($400/pair)</li>\n<li><input disabled=\"\" type=\"checkbox\"> Second Microphone (for stereo recording)</li>\n<li><input disabled=\"\" type=\"checkbox\"> Acoustic Treatment ($100-$300)</li>\n<li><input disabled=\"\" type=\"checkbox\"> MIDI Keyboard ($100-$300)</li>\n</ul>\n<p><strong>🛒 Recommended Gear</strong> <em>(affiliate — I may earn a small commission, at no cost to you)</em></p>\n<ul>\n<li><a target=\"_blank\" rel=\"nofollow sponsored noopener\" href=\"https://www.amazon.com/s?k=Focusrite%20Scarlett%202i2%20audio%20interface&tag=sharkfins-20\">Focusrite Scarlett 2i2</a> — The most popular home-studio interface.</li>\n<li><a target=\"_blank\" rel=\"nofollow sponsored noopener\" href=\"https://www.amazon.com/s?k=Audio-Technica%20AT2020%20condenser%20microphone&tag=sharkfins-20\">Audio-Technica AT2020</a> — An affordable, reliable studio condenser.</li>\n<li><a target=\"_blank\" rel=\"nofollow sponsored noopener\" href=\"https://www.amazon.com/s?k=Audio-Technica%20ATH-M50x%20headphones&tag=sharkfins-20\">Audio-Technica ATH-M50x</a> — Standard closed-back headphones for tracking.</li>\n<li><a target=\"_blank\" rel=\"nofollow sponsored noopener\" href=\"https://www.amazon.com/s?k=Yamaha%20HS5%20studio%20monitor&tag=sharkfins-20\">Yamaha HS5</a> — Accurate monitors for honest mixing decisions.</li>\n</ul>\n<hr>\n<h4 id=\"part-c-setting-up-your-recording-space\">PART C: Setting Up Your Recording Space</h4>\n<p><strong>ROOM ACOUSTICS - The Science:</strong></p>\n<p>Your room affects sound drastically:</p>\n<ul>\n<li>Parallel walls cause <strong>standing waves</strong> (bass buildup at certain frequencies)</li>\n<li>Hard surfaces cause <strong>reflections</strong> (echoes, comb filtering)</li>\n<li>Small rooms emphasize certain frequencies (room modes)</li>\n</ul>\n<p><strong>You don&#39;t need a perfect room, but you need to minimize problems.</strong></p>\n<hr>\n<p><strong>ACOUSTIC TREATMENT BASICS:</strong></p>\n<p><strong>1. ABSORPTION:</strong></p>\n<ul>\n<li>Absorbs sound energy (reduces reflections)</li>\n<li>Made of porous materials (foam, fiberglass, rockwool)</li>\n<li><strong>Targets:</strong> Mid and high frequencies</li>\n</ul>\n<p><strong>2. DIFFUSION:</strong></p>\n<ul>\n<li>Scatters reflections in many directions (breaks up standing waves)</li>\n<li>Made of hard, angled surfaces</li>\n<li><strong>Targets:</strong> Mid frequencies</li>\n</ul>\n<p><strong>3. BASS TRAPS:</strong></p>\n<ul>\n<li>Absorbs low-frequency energy</li>\n<li>Placed in corners (where bass builds up)</li>\n<li>Thick, dense materials</li>\n<li><strong>Targets:</strong> Low frequencies (under 200 Hz)</li>\n</ul>\n<hr>\n<p><strong>DIY ROOM TREATMENT (Budget-Friendly):</strong></p>\n<p><strong>Priority Order:</strong></p>\n<p><strong>1. Corner Bass Traps (Most Important)</strong></p>\n<ul>\n<li>Buy: Acoustic foam corner traps ($50-$100 for 4)</li>\n<li>Or DIY: Fill corners with thick blankets/duvets</li>\n<li>Place in all 4 vertical corners of room</li>\n</ul>\n<p><strong>2. First Reflection Points</strong></p>\n<ul>\n<li>The spots on walls where sound bounces before reaching your ears</li>\n<li>How to find: Have someone hold a mirror on the wall while you sit in your mixing position. When you see the speaker in the mirror, that&#39;s a reflection point</li>\n<li>Treat with: Acoustic panels or hang thick blankets</li>\n</ul>\n<p><strong>3. Behind Listening Position</strong></p>\n<ul>\n<li>Treat the wall behind where you sit</li>\n<li>Reduces comb filtering and early reflections</li>\n</ul>\n<p><strong>Budget Solution:</strong></p>\n<ul>\n<li><strong>Moving blankets:</strong> $20 each, hang on walls</li>\n<li><strong>DIY panels:</strong> Build wooden frames, fill with rockwool insulation, wrap in fabric</li>\n<li><strong>Bookshelves:</strong> Filled bookshelves act as diffusers</li>\n</ul>\n<hr>\n<p><strong>RECORDING SPACE SETUP:</strong></p>\n<p><strong>The &quot;Recording Corner&quot;:</strong></p>\n<pre><code>[Wall with treatment]\n       |\n    [Mic]\n       ↓\n    [You]\n       \n[Computer with Interface on desk nearby]\n</code></pre>\n<p><strong>Key Points:</strong></p>\n<ul>\n<li>Don&#39;t face a bare wall when recording (reflections bounce back into mic)</li>\n<li>Place mic a few feet from walls (reduces early reflections)</li>\n<li>Record in the &quot;deadest&quot; part of your room (most treatment, least reverb)</li>\n<li>Close doors and windows (reduce outside noise)</li>\n</ul>\n<hr>\n<p><strong>MONITORING SETUP:</strong></p>\n<pre><code>        [You sitting here]\n              ↓\n    [Left Monitor] [Right Monitor]\n         60°            60°\n          ↘            ↙\n            [Sweet Spot]\n</code></pre>\n<p><strong>Speaker Placement:</strong></p>\n<ul>\n<li>Form an equilateral triangle (you at one point, speakers at other two)</li>\n<li>Tweeters at ear height</li>\n<li>Speakers angled toward you</li>\n<li>Away from walls (at least 1-2 feet) to reduce bass buildup</li>\n</ul>\n<hr>\n<h4 id=\"part-d-your-first-recording---cover-song\">PART D: Your First Recording - Cover Song</h4>\n<p><strong>PROJECT: Record a Simple Guitar + Vocal Cover</strong></p>\n<p><strong>Song Choice:</strong> Pick something simple you know well</p>\n<ul>\n<li><strong>Suggestion:</strong> &quot;Wonderwall&quot; by Oasis, &quot;Fast Car&quot; by Tracy Chapman, &quot;Riptide&quot; by Vance Joy</li>\n</ul>\n<p><strong>Goal:</strong> Get comfortable with the recording process, not perfection</p>\n<hr>\n<p><strong>STEP-BY-STEP PROCESS:</strong></p>\n<p><strong>STEP 1: Connect Your Gear</strong></p>\n<ol>\n<li>Plug audio interface into computer (USB cable)</li>\n<li>Install drivers if needed (usually auto-installs)</li>\n<li>Plug headphones into interface headphone jack</li>\n<li>Plug microphone into interface with XLR cable</li>\n<li>Plug guitar into interface 1/4&quot; input (or mic your amp)</li>\n<li>Turn on +48V phantom power (for condenser mic)</li>\n</ol>\n<hr>\n<p><strong>STEP 2: Open Your DAW and Create New Project</strong></p>\n<p><strong>In GarageBand/Logic:</strong></p>\n<ul>\n<li>File → New Project</li>\n<li>Choose &quot;Empty Project&quot;</li>\n<li>Sample Rate: 48 kHz</li>\n<li>Save project in dedicated folder</li>\n</ul>\n<p><strong>In Reaper:</strong></p>\n<ul>\n<li>File → New Project</li>\n<li>File → Project Settings → Sample Rate: 48000 Hz, Bit Depth: 24</li>\n<li>Save project</li>\n</ul>\n<hr>\n<p><strong>STEP 3: Create Tracks</strong></p>\n<p><strong>Track 1: Guitar</strong></p>\n<ul>\n<li>Create audio track</li>\n<li>Set input to your interface input 1 (where guitar is plugged in)</li>\n<li>Arm track for recording (red record button)</li>\n</ul>\n<p><strong>Track 2: Vocal</strong></p>\n<ul>\n<li>Create audio track</li>\n<li>Set input to interface input 2 (where mic is plugged in)</li>\n<li>Arm track for recording</li>\n</ul>\n<hr>\n<p><strong>STEP 4: Set Levels (CRITICAL)</strong></p>\n<p><strong>Gain Staging</strong> = setting input levels correctly</p>\n<p><strong>On Your Audio Interface:</strong></p>\n<ul>\n<li>Look at the input gain knob</li>\n<li>Play/sing at your loudest expected volume</li>\n<li>Watch the level meter (LEDs on interface or in DAW)</li>\n<li>Adjust gain so peaks hit around -12 to -6 dB (yellow range, not red)</li>\n<li><strong>Never clip (hit 0 dB/red)</strong> - this causes permanent distortion</li>\n</ul>\n<p><strong>Why -12 to -6 dB?</strong></p>\n<ul>\n<li>Leaves &quot;headroom&quot; for mixing later</li>\n<li>Digital clipping sounds terrible (unlike analog which has &quot;pleasant&quot; distortion)</li>\n<li>You can always make things louder later, but can&#39;t fix clipping</li>\n</ul>\n<hr>\n<p><strong>STEP 5: Record Guitar</strong></p>\n<ol>\n<li>Arm guitar track</li>\n<li>Click metronome on (most DAWs have built-in click)</li>\n<li>Set tempo to match the song</li>\n<li>Count-in (most DAWs have 1-2 bar count-in option)</li>\n<li>Press Record</li>\n<li>Play through the entire song</li>\n<li>Stop recording</li>\n</ol>\n<p><strong>Tips:</strong></p>\n<ul>\n<li>Don&#39;t stop if you make a mistake - finish the whole take</li>\n<li>You can punch-in (re-record sections) later</li>\n<li>Get comfortable with the process first</li>\n</ul>\n<hr>\n<p><strong>STEP 6: Record Vocal</strong></p>\n<ol>\n<li>Disarm guitar track, arm vocal track</li>\n<li>Listen to guitar track in headphones</li>\n<li>Press Record</li>\n<li>Sing through entire song</li>\n<li>Stop recording</li>\n</ol>\n<p><strong>Microphone Technique:</strong></p>\n<ul>\n<li>Sing 6-8 inches from mic</li>\n<li>Slightly off-axis (not straight into mic) to reduce plosives</li>\n<li>Consistent distance (don&#39;t move closer/further)</li>\n</ul>\n<hr>\n<p><strong>STEP 7: Basic Mixing (Very Simple)</strong></p>\n<p><strong>Balance:</strong></p>\n<ul>\n<li>Adjust track volumes (faders) until vocal and guitar blend well</li>\n<li>Vocal should be slightly louder than guitar (lead element)</li>\n</ul>\n<p><strong>Panning:</strong></p>\n<ul>\n<li>Keep guitar centered (pan 0)</li>\n<li>Keep vocal centered (pan 0)</li>\n<li>(We&#39;ll explore panning more in later lessons)</li>\n</ul>\n<p><strong>Basic EQ (Optional - skip if intimidated):</strong></p>\n<ul>\n<li>On vocal track: Cut low end below 80 Hz (removes rumble)</li>\n<li>On guitar track: Cut low end below 60 Hz</li>\n</ul>\n<hr>\n<p><strong>STEP 8: Export Your Song</strong></p>\n<p><strong>In most DAWs:</strong></p>\n<ul>\n<li>File → Export/Bounce</li>\n<li>Format: WAV</li>\n<li>Sample Rate: 48 kHz (or 44.1 kHz for final release)</li>\n<li>Bit Depth: 16-bit (for final release)</li>\n<li>Give it a name: &quot;Wonderwall_Cover_v1.wav&quot;</li>\n</ul>\n<hr>\n<p><strong>WHAT YOU ACCOMPLISHED:</strong></p>\n<p>✅ Set up your recording system\n✅ Recorded a complete song (two tracks)\n✅ Did a basic mix\n✅ Exported a final file</p>\n<p><strong>It probably doesn&#39;t sound professional yet - THAT&#39;S OKAY.</strong></p>\n<p>You learned:</p>\n<ul>\n<li>The recording workflow</li>\n<li>How to set levels</li>\n<li>How to use your DAW</li>\n<li>How to export audio</li>\n</ul>\n<p><strong>This is your foundation. Every lesson from here builds on this.</strong></p>\n<hr>\n<p><strong>MEASURING SUCCESS:</strong></p>\n<ul>\n<li>✅ Understand the science of sound (frequency, amplitude, timbre)</li>\n<li>✅ Own essential recording gear (interface, mic, headphones, DAW)</li>\n<li>✅ Set up functional recording space</li>\n<li>✅ Record and export your first complete song</li>\n</ul>\n<p><strong>NEW SKILL ACQUIRED:</strong> Fundamental understanding of audio and basic recording</p>\n<p><strong>🎵 Songs to Practice With</strong></p>\n<ul>\n<li><strong>Wonderwall — Oasis</strong> — Simple chords, one guitar and vocal — a perfect first cover to record.</li>\n<li><strong>Wish You Were Here — Pink Floyd</strong> — Sparse and acoustic; it exposes (and trains) your recording quality.</li>\n</ul>\n<hr>\n<h3 id=\"lesson-2-understanding-your-daw---the-complete-interface\">Lesson 2: Understanding Your DAW - The Complete Interface</h3>\n<p><strong>Goal:</strong> Master your DAW&#39;s interface and workflow\n<strong>Project:</strong> Record a cover song with multiple takes and basic editing (comp the best parts together)</p>\n<h4 id=\"part-a-daw-interface-deep-dive\">PART A: DAW Interface Deep Dive</h4>\n<p><strong>YOUR DAW IS YOUR INSTRUMENT</strong></p>\n<p>Just like you learned guitar fretboard geography, you need to learn your DAW inside-out.</p>\n<p><strong>We&#39;ll use general terms that apply to ALL DAWs, with specific notes for popular options.</strong></p>\n<hr>\n<p><strong>THE MAIN AREAS OF EVERY DAW:</strong></p>\n<p><strong>1. TRANSPORT CONTROLS</strong></p>\n<ul>\n<li>Play, Stop, Record, Rewind, Fast Forward</li>\n<li>Like a tape deck</li>\n<li><strong>Keyboard Shortcuts (Learn These):</strong><ul>\n<li>Spacebar: Play/Stop (universal)</li>\n<li>R: Record (many DAWs)</li>\n<li>Return to Start: Usually &quot;Home&quot; key or clicking timeline</li>\n</ul>\n</li>\n</ul>\n<p><strong>2. TIMELINE / ARRANGE WINDOW</strong></p>\n<ul>\n<li>Where you see your tracks horizontally across time</li>\n<li>Each track is a horizontal strip</li>\n<li>Audio appears as waveforms (visual representation of sound)</li>\n</ul>\n<p><strong>Visual Representation:</strong></p>\n<pre><code>[Track 1: Guitar]  [====waveform====]\n[Track 2: Vocal]   [====waveform====]\n[Track 3: Bass]    [====waveform====]\n                   ↑\n              Playhead (shows current position)\n</code></pre>\n<p><strong>3. MIXER WINDOW</strong></p>\n<ul>\n<li>Vertical faders for each track (like a physical mixing console)</li>\n<li>Volume, pan, effects inserts, sends</li>\n<li><strong>Looks like:</strong></li>\n</ul>\n<pre><code>[Track 1] [Track 2] [Track 3] [Master]\n  │█│       │█│       │█│       │█│\n  ││        ││        ││        ││\n Volume    Volume    Volume   Master\n                               Volume\n</code></pre>\n<p><strong>4. INSPECTOR / CHANNEL STRIP</strong></p>\n<ul>\n<li>Detailed view of selected track</li>\n<li>Shows all settings for that track</li>\n</ul>\n<p><strong>5. BROWSER / LOOP LIBRARY</strong></p>\n<ul>\n<li>Access to audio files, loops, samples, virtual instruments</li>\n</ul>\n<p><strong>6. PLUGINS WINDOW</strong></p>\n<ul>\n<li>Effects, instruments, processors</li>\n</ul>\n<hr>\n<p><strong>TRACKS - Types and Functions:</strong></p>\n<p><strong>AUDIO TRACKS:</strong></p>\n<ul>\n<li>Record and playback audio (vocals, guitar, etc.)</li>\n<li>Display waveforms</li>\n<li>Can apply effects</li>\n</ul>\n<p><strong>MIDI TRACKS:</strong></p>\n<ul>\n<li>Record and playback MIDI data (notes, not audio)</li>\n<li>Used with virtual instruments</li>\n<li>Shows notes on piano roll</li>\n</ul>\n<p><strong>INSTRUMENT TRACKS:</strong></p>\n<ul>\n<li>Combines MIDI track + virtual instrument</li>\n<li>Play software synths, drums, etc.</li>\n</ul>\n<p><strong>AUX/BUS TRACKS:</strong></p>\n<ul>\n<li>Routing tracks (we&#39;ll cover in mixing lessons)</li>\n<li>Send multiple tracks to one effect</li>\n</ul>\n<p><strong>MASTER TRACK:</strong></p>\n<ul>\n<li>Final output (everything sums here)</li>\n<li>Where you adjust overall volume and mastering effects</li>\n</ul>\n<hr>\n<p><strong>UNDERSTANDING THE GRID:</strong></p>\n<p><strong>Bars and Beats:</strong></p>\n<p>Music is organized in time:</p>\n<ul>\n<li><strong>Beat:</strong> One click of the metronome</li>\n<li><strong>Bar/Measure:</strong> Usually 4 beats (in 4/4 time signature)</li>\n</ul>\n<p><strong>Time Signatures:</strong></p>\n<ul>\n<li><strong>4/4:</strong> Four beats per bar, quarter note gets one beat (most common - rock, pop, country)</li>\n<li><strong>3/4:</strong> Three beats per bar (waltz time)</li>\n<li><strong>6/8:</strong> Six beats per bar, eighth note feel (ballads)</li>\n</ul>\n<p><strong>Your DAW Grid:</strong></p>\n<ul>\n<li>Can snap to bars, beats, or smaller divisions (8th notes, 16th notes, etc.)</li>\n<li><strong>Snap On:</strong> Regions/clips align to grid automatically (good for tight timing)</li>\n<li><strong>Snap Off:</strong> Free placement (good for natural, slightly off-grid feel)</li>\n</ul>\n<hr>\n<p><strong>TEMPO AND KEY:</strong></p>\n<p><strong>Tempo (BPM - Beats Per Minute):</strong></p>\n<ul>\n<li>How fast the song is</li>\n<li>60 BPM = 1 beat per second</li>\n<li>120 BPM = 2 beats per second</li>\n<li>Common tempos:<ul>\n<li>Ballad: 60-80 BPM</li>\n<li>Mid-tempo: 90-110 BPM</li>\n<li>Upbeat: 120-140 BPM</li>\n<li>Fast: 140-180 BPM</li>\n</ul>\n</li>\n</ul>\n<p><strong>Setting Tempo:</strong></p>\n<ul>\n<li>Most DAWs have tempo field at top</li>\n<li>Can automate tempo (change speed throughout song)</li>\n</ul>\n<p><strong>Key:</strong></p>\n<ul>\n<li>Musical key of your song (C major, A minor, etc.)</li>\n<li>Some DAWs display this for reference</li>\n<li>Helps when using MIDI/virtual instruments</li>\n</ul>\n<hr>\n<h4 id=\"part-b-essential-editing-techniques\">PART B: Essential Editing Techniques</h4>\n<p><strong>THE EDITING TOOLKIT:</strong></p>\n<p><strong>1. SELECTION TOOL</strong></p>\n<ul>\n<li>Click and drag to select regions/clips</li>\n<li>Move, copy, delete audio</li>\n</ul>\n<p><strong>2. TRIM TOOL</strong></p>\n<ul>\n<li>Shorten or lengthen regions from start/end</li>\n<li>Non-destructive (original audio still exists)</li>\n</ul>\n<p><strong>3. SPLIT/CUT TOOL</strong></p>\n<ul>\n<li>Slice audio into separate regions</li>\n<li>Useful for comping (we&#39;ll do this in the project)</li>\n</ul>\n<p><strong>4. FADE TOOL</strong></p>\n<ul>\n<li>Create fade ins/outs</li>\n<li>Crossfades between regions</li>\n</ul>\n<p><strong>5. ZOOM TOOLS</strong></p>\n<ul>\n<li>Zoom in/out horizontally (time)</li>\n<li>Zoom in/out vertically (track height)</li>\n</ul>\n<p><strong>Keyboard Shortcuts:</strong></p>\n<ul>\n<li>Learn your DAW&#39;s shortcuts (saves hours of work)</li>\n<li>Most have customizable shortcuts</li>\n</ul>\n<hr>\n<p><strong>ESSENTIAL EDITING OPERATIONS:</strong></p>\n<p><strong>COPYING AUDIO:</strong></p>\n<ol>\n<li>Select region</li>\n<li>Copy (Cmd+C / Ctrl+C)</li>\n<li>Paste (Cmd+V / Ctrl+V)</li>\n</ol>\n<p><strong>LOOPING AUDIO:</strong></p>\n<ol>\n<li>Select region</li>\n<li>Option+Drag (Mac) or Alt+Drag (Windows) to duplicate</li>\n<li>Repeat to create loops</li>\n</ol>\n<p><strong>MOVING AUDIO:</strong></p>\n<ol>\n<li>Select region</li>\n<li>Drag to new position</li>\n<li>Hold Snap to align to grid</li>\n</ol>\n<p><strong>TRIMMING AUDIO:</strong></p>\n<ol>\n<li>Hover over edge of region</li>\n<li>Drag inward to shorten, outward to reveal more</li>\n<li>(Only reveals audio if it exists - you can&#39;t extend beyond original recording)</li>\n</ol>\n<p><strong>SPLITTING AUDIO:</strong></p>\n<ol>\n<li>Place playhead where you want to cut</li>\n<li>Split command (varies by DAW - often Cmd+T or S key)</li>\n<li>Creates two separate regions</li>\n</ol>\n<hr>\n<p><strong>FADES AND CROSSFADES:</strong></p>\n<p><strong>Why Fades Matter:</strong></p>\n<ul>\n<li>Prevent clicks and pops (sudden starts/stops cause audible artifacts)</li>\n<li>Create smooth transitions</li>\n</ul>\n<p><strong>Fade In:</strong></p>\n<ul>\n<li>Gradually increases volume from silence</li>\n<li>Place at start of audio regions</li>\n</ul>\n<p><strong>Fade Out:</strong></p>\n<ul>\n<li>Gradually decreases volume to silence</li>\n<li>Place at end of audio regions</li>\n</ul>\n<p><strong>Crossfade:</strong></p>\n<ul>\n<li>Overlaps two audio regions with fade out + fade in</li>\n<li>Creates seamless transition</li>\n</ul>\n<p><strong>How to Apply:</strong></p>\n<ol>\n<li>Select region</li>\n<li>Find Fade tool/handle (usually in corners)</li>\n<li>Drag to create fade</li>\n<li>Adjust fade curve (linear, logarithmic, S-curve)</li>\n</ol>\n<p><strong>Fade Curves:</strong></p>\n<ul>\n<li><strong>Linear:</strong> Straight volume change (sounds unnatural)</li>\n<li><strong>Equal Power:</strong> Smooth, even-sounding (best for crossfades)</li>\n<li><strong>Exponential:</strong> Quick or slow start/end (musical fades)</li>\n</ul>\n<hr>\n<h4 id=\"part-c-comping---creating-the-perfect-take\">PART C: Comping - Creating the Perfect Take</h4>\n<p><strong>WHAT IS COMPING?</strong></p>\n<p><strong>Comping = Composite editing</strong> = recording multiple takes, then selecting the best parts of each to create one perfect take.</p>\n<p><strong>Professional Secret:</strong>\nAlmost ZERO professional vocals (or guitar solos) are single takes. They&#39;re comps of 3-10+ takes.</p>\n<hr>\n<p><strong>THE COMPING PROCESS:</strong></p>\n<p><strong>STEP 1: Record Multiple Takes</strong></p>\n<p><strong>Track Setup:</strong></p>\n<ul>\n<li>Arm your track</li>\n<li>Enable &quot;Loop Recording&quot; or &quot;Cycle Recording&quot; mode</li>\n<li>Set loop range (start to end of section you&#39;re recording)</li>\n</ul>\n<p><strong>Recording:</strong></p>\n<ul>\n<li>Press Record</li>\n<li>DAW records first take through the loop</li>\n<li>When it loops back, it records Take 2 underneath (or on a new playlist)</li>\n<li>Keep going - record 3-5 takes without stopping</li>\n</ul>\n<p><strong>Result:</strong></p>\n<ul>\n<li>You now have 3-5 complete takes of the same section</li>\n<li>DAW stacks them or organizes them as playlists/lanes</li>\n</ul>\n<hr>\n<p><strong>STEP 2: Review Takes (Soloing)</strong></p>\n<p><strong>Listen to each take:</strong></p>\n<ul>\n<li>Solo Take 1, listen through</li>\n<li>Note: &quot;First verse is great, chorus is pitchy&quot;</li>\n<li>Solo Take 2, listen through</li>\n<li>Note: &quot;Verse is weak, chorus is amazing&quot;</li>\n<li>Continue for all takes</li>\n</ul>\n<p><strong>Mark the Best Sections:</strong></p>\n<ul>\n<li>Some DAWs have color coding (mark green for good)</li>\n<li>Mental note or text notes work too</li>\n</ul>\n<hr>\n<p><strong>STEP 3: Build the Comp</strong></p>\n<p><strong>Method 1: Manual Comp (Universal - Works in Any DAW)</strong></p>\n<ol>\n<li>Create a new blank track (your comp track)</li>\n<li>Find the best section of Take 1</li>\n<li>Split/trim to isolate that section</li>\n<li>Copy and paste to comp track</li>\n<li>Find the best section of Take 2</li>\n<li>Paste it next to the first section on comp track</li>\n<li>Create crossfade between the two sections</li>\n<li>Repeat for all sections</li>\n</ol>\n<p><strong>Method 2: Comp Tool (DAWs with Built-In Comping)</strong></p>\n<p><strong>Logic Pro, Studio One, Pro Tools:</strong></p>\n<ol>\n<li>Enter Comp mode</li>\n<li>Click and drag over sections you want to keep from each take</li>\n<li>DAW automatically creates crossfades</li>\n<li>Much faster once you learn it</li>\n</ol>\n<p><strong>GarageBand:</strong></p>\n<ul>\n<li>Simplified version of Logic&#39;s comp tool</li>\n<li>Click on different take regions to select best parts</li>\n</ul>\n<hr>\n<p><strong>STEP 4: Fine-Tune the Comp</strong></p>\n<p><strong>Listen to the full comp:</strong></p>\n<ul>\n<li>Do transitions sound natural?</li>\n<li>Are crossfades smooth?</li>\n<li>Any clicks or pops?</li>\n</ul>\n<p><strong>Adjust Crossfades:</strong></p>\n<ul>\n<li>If transition sounds abrupt, widen the crossfade</li>\n<li>If transition sounds phasy, adjust fade curves or move edit point</li>\n</ul>\n<p><strong>Timing Adjustments:</strong></p>\n<ul>\n<li>Nudge regions earlier/later if timing feels off</li>\n<li>Use Flex Time / Elastic Audio (time-stretching) if needed</li>\n</ul>\n<hr>\n<h4 id=\"part-d-project---cover-song-with-comping\">PART D: Project - Cover Song with Comping</h4>\n<p><strong>PROJECT: Record &quot;Fast Car&quot; (or your chosen song) with comped vocals</strong></p>\n<p><strong>STEP 1: Record Guitar Foundation</strong></p>\n<ul>\n<li>Record guitar in one take</li>\n<li>Or record multiple takes and comp the best one</li>\n<li>This is your timing reference</li>\n</ul>\n<p><strong>STEP 2: Record Vocal Takes (Multiple)</strong></p>\n<ul>\n<li>Enable loop recording</li>\n<li>Record 4-5 complete vocal takes</li>\n<li>Don&#39;t judge yourself during recording - just perform</li>\n</ul>\n<p><strong>STEP 3: Comp the Vocal</strong></p>\n<ul>\n<li>Go section by section:<ul>\n<li>Verse 1: Pick best take</li>\n<li>Chorus 1: Pick best take (might be different take)</li>\n<li>Verse 2: Pick best take</li>\n<li>Etc.</li>\n</ul>\n</li>\n<li>Create smooth crossfades</li>\n</ul>\n<p><strong>STEP 4: Basic Processing</strong></p>\n<p><strong>On Vocal Track:</strong></p>\n<ul>\n<li>Add high-pass filter (cut below 80 Hz)</li>\n<li>Add gentle compression (we&#39;ll go deep into this in Lesson 5)<ul>\n<li>Ratio: 3:1</li>\n<li>Threshold: Adjust so 3-6 dB of gain reduction</li>\n<li>Fast attack, medium release</li>\n</ul>\n</li>\n</ul>\n<p><strong>On Guitar Track:</strong></p>\n<ul>\n<li>Add high-pass filter (cut below 60 Hz)</li>\n<li>Add slight reverb (we&#39;ll dive deep into effects in Lesson 6)<ul>\n<li>Reverb time: 1.5 seconds</li>\n<li>Mix: 15-20%</li>\n</ul>\n</li>\n</ul>\n<p><strong>STEP 5: Balance Mix</strong></p>\n<ul>\n<li>Vocal slightly louder than guitar</li>\n<li>Both centered (pan 0)</li>\n</ul>\n<p><strong>STEP 6: Export</strong></p>\n<ul>\n<li>Bounce to WAV</li>\n<li>Name: &quot;FastCar_Cover_Comped_v1.wav&quot;</li>\n</ul>\n<hr>\n<p><strong>WHAT YOU LEARNED:</strong></p>\n<p>✅ DAW interface navigation\n✅ Track types and functions\n✅ Essential editing tools\n✅ Copying, moving, trimming, splitting audio\n✅ Fades and crossfades\n✅ Comping workflow (professional technique)\n✅ Creating a polished comp from multiple takes</p>\n<p><strong>This song should sound noticeably better than Lesson 1&#39;s song.</strong></p>\n<p>You now have:</p>\n<ul>\n<li>The best parts of each take</li>\n<li>Smooth transitions</li>\n<li>Basic processing</li>\n</ul>\n<hr>\n<p><strong>MEASURING SUCCESS:</strong></p>\n<ul>\n<li>✅ Navigate DAW confidently without getting lost</li>\n<li>✅ Record multiple takes using loop recording</li>\n<li>✅ Comp the best parts of each take into one performance</li>\n<li>✅ Create smooth crossfades between edits</li>\n<li>✅ Export a polished cover song</li>\n</ul>\n<p><strong>NEW SKILL ACQUIRED:</strong> DAW mastery and professional comping technique</p>\n<p><strong>🎵 Songs to Practice With</strong></p>\n<ul>\n<li><strong>Hallelujah — Jeff Buckley</strong> — An emotive vocal you&#39;ll want many takes of — ideal comping practice.</li>\n<li><strong>The Scientist — Coldplay</strong> — Simple piano and vocal; comp together the best-phrased lines.</li>\n</ul>\n<hr>\n<h3 id=\"lesson-3-the-science-of-eq---sculpting-frequency\">Lesson 3: The Science of EQ - Sculpting Frequency</h3>\n<p><strong>Goal:</strong> Deep understanding of equalization and how to shape tone\n<strong>Project:</strong> Record a cover song and mix it with intentional EQ on every track</p>\n<h4 id=\"part-a-what-is-eq-the-physics-and-psychology\">PART A: What is EQ? The Physics and Psychology</h4>\n<p><strong>EQUALIZATION (EQ) = Adjusting the volume of specific frequencies</strong></p>\n<p>Think of it like a super-detailed volume control where instead of &quot;louder/quieter,&quot; you can control &quot;more bass,&quot; &quot;more mids,&quot; &quot;more highs&quot; - and everything in between.</p>\n<hr>\n<p><strong>THE FREQUENCY SPECTRUM (Revisited with Purpose):</strong></p>\n<p><strong>20-60 Hz: SUB-BASS</strong></p>\n<ul>\n<li><strong>Feel:</strong> Physically felt more than heard</li>\n<li><strong>Sources:</strong> Kick drum fundamental, bass guitar, sub-bass synth</li>\n<li><strong>Too much:</strong> Muddy, woofy, undefined</li>\n<li><strong>Too little:</strong> Thin, no power</li>\n<li><strong>Mixing Strategy:</strong> Only bass instruments should occupy this range. Cut it from everything else.</li>\n</ul>\n<p><strong>60-250 Hz: BASS</strong></p>\n<ul>\n<li><strong>Feel:</strong> Warmth, power, body</li>\n<li><strong>Sources:</strong> Bass guitar, kick drum, toms, piano low notes, male vocals (some)</li>\n<li><strong>Too much:</strong> Muddy, boomy, masks other instruments</li>\n<li><strong>Too little:</strong> Thin, weak, lacks weight</li>\n<li><strong>Mixing Strategy:</strong> This is the most problematic range in home studios (rooms exaggerate bass). Often needs cutting.</li>\n</ul>\n<p><strong>250-500 Hz: LOW MIDS</strong></p>\n<ul>\n<li><strong>Feel:</strong> Fullness, thickness, body</li>\n<li><strong>Sources:</strong> Guitars, snare body, vocals, most instruments have energy here</li>\n<li><strong>Too much:</strong> Boxy, muddy, instruments blend together</li>\n<li><strong>Too little:</strong> Hollow, thin</li>\n<li><strong>Mixing Strategy:</strong> Usually needs cutting to create clarity and separation.</li>\n</ul>\n<p><strong>500-2,000 Hz: MIDS</strong></p>\n<ul>\n<li><strong>Feel:</strong> Presence, definition, clarity</li>\n<li><strong>Sources:</strong> Vocals, guitars, most instruments</li>\n<li><strong>Too much:</strong> Nasal, honky, harsh</li>\n<li><strong>Too little:</strong> Distant, weak, gets buried in mix</li>\n<li><strong>Mixing Strategy:</strong> This is where instruments &quot;speak.&quot; Boosting here makes things cut through.</li>\n</ul>\n<p><strong>2-4 kHz: UPPER MIDS</strong></p>\n<ul>\n<li><strong>Feel:</strong> Clarity, intelligibility, definition</li>\n<li><strong>Sources:</strong> Vocal consonants, attack of instruments, pick attack on guitar</li>\n<li><strong>Too much:</strong> Harsh, fatiguing, piercing</li>\n<li><strong>Too little:</strong> Dull, muffled, unclear</li>\n<li><strong>Mixing Strategy:</strong> Critical for vocals to be understood. Boost gently for clarity.</li>\n</ul>\n<p><strong>4-6 kHz: PRESENCE</strong></p>\n<ul>\n<li><strong>Feel:</strong> Edge, aggression, intimacy</li>\n<li><strong>Sources:</strong> Vocal proximity, instrument attack</li>\n<li><strong>Too much:</strong> Sibilance (harsh S sounds), ear fatigue</li>\n<li><strong>Too little:</strong> Dull, lacks edge</li>\n<li><strong>Mixing Strategy:</strong> Small boosts add &quot;in your face&quot; quality. Be careful - this is where harsh digital sound lives.</li>\n</ul>\n<p><strong>6-20 kHz: HIGH FREQUENCIES / AIR</strong></p>\n<ul>\n<li><strong>Feel:</strong> Sparkle, air, space, brightness</li>\n<li><strong>Sources:</strong> Cymbals, acoustic guitar shimmer, vocal breathiness</li>\n<li><strong>Too much:</strong> Harsh, brittle, sibilant</li>\n<li><strong>Too little:</strong> Dull, dark, muffled</li>\n<li><strong>Mixing Strategy:</strong> Gentle boost adds &quot;expensive&quot; professional sheen. Called &quot;air&quot; for a reason - adds openness.</li>\n</ul>\n<hr>\n<p><strong>THE SCIENCE OF EQ - How It Actually Works:</strong></p>\n<p><strong>EQ is a FILTER - it allows certain frequencies through while reducing others.</strong></p>\n<p><strong>Types of Filters:</strong></p>\n<p><strong>1. HIGH-PASS FILTER (HPF) / LOW-CUT FILTER</strong></p>\n<ul>\n<li>Allows high frequencies through, cuts low frequencies</li>\n<li>Like a gate: &quot;High frequencies, you may pass. Low frequencies, you&#39;re blocked.&quot;</li>\n<li><strong>Measured by:</strong> Cutoff frequency (where the cutting begins)</li>\n</ul>\n<p><strong>Visual:</strong></p>\n<pre><code>Volume\n  │\n  │     ╱────────  (Flat - no cutting)\n  │   ╱\n  │ ╱  (Filter slope)\n  ╱\n──┴─────────────  Frequency →\n  ↑\n  Cutoff Point\n</code></pre>\n<p><strong>Use:</strong> Remove rumble, low-end mud, and information you don&#39;t need</p>\n<p><strong>Example:</strong> High-pass vocal at 80 Hz (no vocal content that low - only rumble from room, mic handling, etc.)</p>\n<p><strong>2. LOW-PASS FILTER (LPF) / HIGH-CUT FILTER</strong></p>\n<ul>\n<li>Allows low frequencies through, cuts high frequencies</li>\n<li>Opposite of high-pass</li>\n</ul>\n<p><strong>Visual:</strong></p>\n<pre><code>Volume\n  │\n  │────────╲\n  │          ╲\n  │            ╲  (Filter slope)\n  │              ╲\n──┴────────────────╲  Frequency →\n                    ↑\n                    Cutoff Point\n</code></pre>\n<p><strong>Use:</strong> Remove harsh highs, tame brightness, create &quot;lo-fi&quot; sound</p>\n<p><strong>Example:</strong> Low-pass bass guitar at 8 kHz (no useful information that high - only fret noise)</p>\n<p><strong>3. BELL/PEAK FILTER</strong></p>\n<ul>\n<li>Boosts or cuts a specific range</li>\n<li>The classic &quot;EQ curve&quot;</li>\n</ul>\n<p><strong>Visual (Boost):</strong></p>\n<pre><code>Volume\n  │        ╱─╲\n  │      ╱     ╲\n  │────╱         ╲────\n  │\n──┴─────────────────  Frequency →\n         ↑\n    Center Frequency\n</code></pre>\n<p><strong>Visual (Cut):</strong></p>\n<pre><code>Volume\n  │\n  │────╲         ╱────\n  │      ╲     ╱\n  │        ╲─╱\n──┴─────────────────  Frequency →\n         ↑\n    Center Frequency\n</code></pre>\n<p><strong>Parameters:</strong></p>\n<ul>\n<li><strong>Frequency:</strong> Which frequency to affect (e.g., 1 kHz)</li>\n<li><strong>Gain:</strong> How much to boost/cut (+6 dB, -3 dB, etc.)</li>\n<li><strong>Q (Bandwidth):</strong> How wide or narrow the affected range<ul>\n<li>Low Q (0.5-1.0): Wide, gentle, musical</li>\n<li>High Q (5-10): Narrow, surgical, for removing specific problems</li>\n</ul>\n</li>\n</ul>\n<p><strong>4. SHELF FILTER</strong></p>\n<ul>\n<li>Boosts or cuts all frequencies above or below a point</li>\n<li>Gentler than HPF/LPF</li>\n</ul>\n<p><strong>High Shelf:</strong></p>\n<pre><code>Volume         ╱──────────\n  │          ╱\n  │        ╱\n  │──────╱\n──┴─────────────────  Frequency →\n        ↑\n    Shelf Frequency\n</code></pre>\n<p><strong>Use:</strong> &quot;Add brightness&quot; or &quot;add warmth&quot; without being too surgical</p>\n<p><strong>Example:</strong> High shelf at 10 kHz, +2 dB = adds &quot;air&quot; and shimmer to everything above 10 kHz</p>\n<hr>\n<p><strong>Q-FACTOR EXPLAINED:</strong></p>\n<p>Q is one of the most misunderstood EQ parameters.</p>\n<p><strong>Q = Bandwidth = How Wide the Filter Is</strong></p>\n<p><strong>Low Q (0.5-1.0): Wide, Musical</strong></p>\n<ul>\n<li>Affects broad range of frequencies</li>\n<li>Sounds natural</li>\n<li>Use for: General tonal shaping (&quot;add warmth,&quot; &quot;brighten it up&quot;)</li>\n</ul>\n<p><strong>Medium Q (2-3): Surgical</strong></p>\n<ul>\n<li>Affects moderate range</li>\n<li>Use for: Targeting specific issues</li>\n</ul>\n<p><strong>High Q (5-10+): Laser-Focused</strong></p>\n<ul>\n<li>Affects very narrow range</li>\n<li>Sounds unnatural if boosted</li>\n<li>Use for: Removing specific problem frequencies (notch filter)</li>\n</ul>\n<p><strong>Example:</strong></p>\n<ul>\n<li>Boost at 5 kHz with Q=1.0: Adds general presence and clarity (musical)</li>\n<li>Boost at 5 kHz with Q=8.0: Adds harsh, weird resonance (unnatural)</li>\n<li>Cut at 3 kHz with Q=8.0: Removes specific harsh frequency (useful)</li>\n</ul>\n<hr>\n<p><strong>THE GOLDEN RULE OF EQ:</strong></p>\n<p><strong>&quot;Cut to Fix, Boost to Enhance&quot;</strong></p>\n<p><strong>Cutting is Transparent:</strong></p>\n<ul>\n<li>Removes problems (muddiness, harshness, boxiness)</li>\n<li>Rarely sounds &quot;wrong&quot;</li>\n<li>Often more effective than boosting</li>\n</ul>\n<p><strong>Boosting is Obvious:</strong></p>\n<ul>\n<li>Adds character or emphasis</li>\n<li>Can sound unnatural if overdone</li>\n<li>Should be used sparingly</li>\n</ul>\n<p><strong>Professional Approach:</strong></p>\n<ol>\n<li>First, cut problematic frequencies</li>\n<li>Then, boost desirable frequencies (if needed)</li>\n<li>Less is more (3-4 dB changes are often enough)</li>\n</ol>\n<p><strong>🎵 Songs to Practice With</strong></p>\n<ul>\n<li><strong>Aja — Steely Dan</strong> — Surgical EQ separation across a dense mix — a reference for frequency clarity.</li>\n<li><strong>Get Lucky — Daft Punk</strong> — Every element sits in its own frequency band; study the spectral balance.</li>\n</ul>\n<hr>\n<h4 id=\"part-b-eq-types-and-when-to-use-each\">PART B: EQ Types and When to Use Each</h4>\n<p><strong>PARAMETRIC EQ:</strong></p>\n<p><strong>What it is:</strong> Full control over frequency, gain, and Q for each band</p>\n<p><strong>Features:</strong></p>\n<ul>\n<li>Multiple bands (3-10+ bands)</li>\n<li>Adjustable everything</li>\n<li>Most flexible</li>\n</ul>\n<p><strong>When to use:</strong></p>\n<ul>\n<li>Detailed mixing</li>\n<li>Surgical fixes</li>\n<li>Complete tonal shaping</li>\n</ul>\n<p><strong>Popular Plugins:</strong></p>\n<ul>\n<li>FabFilter Pro-Q 3 (industry standard, $180)</li>\n<li>Waves Renaissance EQ (affordable, $30)</li>\n<li>Stock DAW EQs (Logic&#39;s Channel EQ, Pro Tools EQ III)</li>\n</ul>\n<hr>\n<p><strong>GRAPHIC EQ:</strong></p>\n<p><strong>What it is:</strong> Fixed frequency bands with sliders</p>\n<p><strong>Features:</strong></p>\n<ul>\n<li>5-31 bands (typically 31 bands for live sound)</li>\n<li>Visual (looks like a bar graph)</li>\n<li>Each slider affects fixed frequency</li>\n</ul>\n<p><strong>When to use:</strong></p>\n<ul>\n<li>Quick fixes</li>\n<li>Live sound</li>\n<li>Room tuning</li>\n<li>Rarely in recording (parametric is better)</li>\n</ul>\n<hr>\n<p><strong>VINTAGE/ANALOG-MODELED EQ:</strong></p>\n<p><strong>What it is:</strong> Emulations of classic hardware EQs</p>\n<p><strong>Examples:</strong></p>\n<ul>\n<li>Pultec EQ (smooth, musical, vintage vibe)</li>\n<li>Neve 1073 EQ (British console, colored sound)</li>\n<li>SSL EQ (punchy, modern, aggressive)</li>\n<li>API 550 (surgical, tight, focused)</li>\n</ul>\n<p><strong>Why use them:</strong></p>\n<ul>\n<li>Add analog &quot;color&quot; (pleasant harmonic distortion)</li>\n<li>Have &quot;vibe&quot; that digital EQs don&#39;t</li>\n<li>Fixed bands/curves that are known to sound good</li>\n</ul>\n<p><strong>When to use:</strong></p>\n<ul>\n<li>When you want character, not just correction</li>\n<li>On key elements (vocals, drums, bass)</li>\n<li>Not for surgical work (use parametric for that)</li>\n</ul>\n<hr>\n<p><strong>LINEAR PHASE EQ:</strong></p>\n<p><strong>What it is:</strong> EQ that doesn&#39;t alter phase relationships</p>\n<p><strong>The Problem with Regular EQ:</strong>\nWhen you EQ, you subtly shift the timing of frequencies relative to each other (phase shift). Usually imperceptible, but can cause issues.</p>\n<p><strong>Linear Phase EQ:</strong></p>\n<ul>\n<li>No phase shift</li>\n<li>Maintains perfect frequency relationships</li>\n<li>Uses more CPU</li>\n</ul>\n<p><strong>When to use:</strong></p>\n<ul>\n<li>Mastering (where phase integrity is critical)</li>\n<li>Master bus EQ</li>\n<li>Parallel processing</li>\n</ul>\n<p><strong>When NOT to use:</strong></p>\n<ul>\n<li>Individual tracks (phase shift is often desirable - adds analog character)</li>\n<li>Can sound &quot;stiff&quot; or &quot;sterile&quot;</li>\n</ul>\n<hr>\n<p><strong>DYNAMIC EQ:</strong></p>\n<p><strong>What it is:</strong> EQ that only engages when a frequency exceeds a threshold</p>\n<p><strong>How it works:</strong></p>\n<ul>\n<li>Like a compressor + EQ</li>\n<li>Only cuts/boosts when the problem occurs</li>\n</ul>\n<p><strong>Example:</strong></p>\n<ul>\n<li>Vocal has harsh sibilance (S sounds) at 8 kHz</li>\n<li>Regular EQ: Cuts 8 kHz all the time (dulls the whole vocal)</li>\n<li>Dynamic EQ: Only cuts 8 kHz when S sounds happen (preserves natural brightness)</li>\n</ul>\n<p><strong>When to use:</strong></p>\n<ul>\n<li>Intermittent problems (not constant)</li>\n<li>De-essing vocals</li>\n<li>Taming harsh frequencies that come and go</li>\n</ul>\n<p><strong>Popular Plugins:</strong></p>\n<ul>\n<li>FabFilter Pro-Q 3 (has dynamic bands)</li>\n<li>Waves F6 (dedicated dynamic EQ)</li>\n</ul>\n<hr>\n<h4 id=\"part-c-eq-strategy-for-common-instruments\">PART C: EQ Strategy for Common Instruments</h4>\n<p><strong>VOCALS:</strong></p>\n<p><strong>PROBLEMS TO FIX:</strong></p>\n<p><strong>Muddy Vocal (Lacks Clarity):</strong></p>\n<ul>\n<li><strong>Cut:</strong> 250-400 Hz, Q=1.5, -3 to -6 dB</li>\n<li><strong>Reason:</strong> Removes boxiness and mud</li>\n</ul>\n<p><strong>Nasal Vocal (Honky):</strong></p>\n<ul>\n<li><strong>Cut:</strong> 800-1,200 Hz, Q=3, -2 to -4 dB (sweep to find exact honky frequency)</li>\n<li><strong>Reason:</strong> Removes nasality</li>\n</ul>\n<p><strong>Harsh Vocal (Strident, Fatiguing):</strong></p>\n<ul>\n<li><strong>Cut:</strong> 2.5-4 kHz, Q=2, -2 to -4 dB</li>\n<li><strong>Reason:</strong> Reduces harshness</li>\n</ul>\n<p><strong>Sibilant Vocal (Harsh S Sounds):</strong></p>\n<ul>\n<li><strong>Cut:</strong> 6-8 kHz, narrow Q (or use de-esser)</li>\n<li><strong>Reason:</strong> Tames sibilance</li>\n</ul>\n<p><strong>ENHANCEMENTS:</strong></p>\n<p><strong>Add Warmth:</strong></p>\n<ul>\n<li><strong>Boost:</strong> 200-300 Hz, Q=1, +1 to +3 dB</li>\n<li><strong>Reason:</strong> Adds body and fullness</li>\n</ul>\n<p><strong>Add Presence (Cut Through Mix):</strong></p>\n<ul>\n<li><strong>Boost:</strong> 3-5 kHz, Q=1.5, +2 to +4 dB</li>\n<li><strong>Reason:</strong> Increases clarity and intelligibility</li>\n</ul>\n<p><strong>Add Air (Professional Sheen):</strong></p>\n<ul>\n<li><strong>Boost:</strong> 10-15 kHz, shelf, +2 to +3 dB</li>\n<li><strong>Reason:</strong> Adds shimmer and openness</li>\n</ul>\n<p><strong>STARTING VOCAL EQ TEMPLATE:</strong></p>\n<ol>\n<li>HPF at 80 Hz (remove rumble)</li>\n<li>Cut 250-400 Hz, -3 dB (reduce mud)</li>\n<li>Boost 3-5 kHz, +2 dB (add presence)</li>\n<li>Shelf boost 10 kHz, +1.5 dB (add air)</li>\n</ol>\n<hr>\n<p><strong>ACOUSTIC GUITAR:</strong></p>\n<p><strong>PROBLEMS TO FIX:</strong></p>\n<p><strong>Muddy Guitar:</strong></p>\n<ul>\n<li><strong>Cut:</strong> 200-400 Hz, Q=1.5, -3 to -5 dB</li>\n</ul>\n<p><strong>Boxy Guitar:</strong></p>\n<ul>\n<li><strong>Cut:</strong> 400-800 Hz, sweep to find box, Q=2, -3 dB</li>\n</ul>\n<p><strong>Harsh Pick Attack:</strong></p>\n<ul>\n<li><strong>Cut:</strong> 3-5 kHz, Q=2, -2 dB</li>\n</ul>\n<p><strong>ENHANCEMENTS:</strong></p>\n<p><strong>Add Body:</strong></p>\n<ul>\n<li><strong>Boost:</strong> 120-200 Hz, Q=1, +2 dB</li>\n</ul>\n<p><strong>Add Shimmer:</strong></p>\n<ul>\n<li><strong>Boost:</strong> 8-12 kHz, shelf, +2 to +3 dB</li>\n</ul>\n<p><strong>STARTING ACOUSTIC GUITAR EQ:</strong></p>\n<ol>\n<li>HPF at 60-80 Hz</li>\n<li>Cut 300 Hz, -3 dB (reduce mud)</li>\n<li>Boost 10 kHz, +2 dB shelf (add shimmer)</li>\n</ol>\n<hr>\n<p><strong>ELECTRIC GUITAR:</strong></p>\n<p><strong>Clean/Rhythm Guitar:</strong></p>\n<ul>\n<li>HPF at 80 Hz</li>\n<li>Cut 200-300 Hz, -2 to -4 dB (make room for bass)</li>\n<li>Boost 2-3 kHz, +1 to +3 dB (add bite)</li>\n</ul>\n<p><strong>Lead Guitar:</strong></p>\n<ul>\n<li>HPF at 100 Hz</li>\n<li>Cut 200-400 Hz, -3 dB (thin it out so it floats above mix)</li>\n<li>Boost 2-4 kHz, +3 to +5 dB (make it scream)</li>\n<li>Boost 8 kHz, +2 dB (add presence)</li>\n</ul>\n<p><strong>Distorted Guitar:</strong></p>\n<ul>\n<li>HPF at 100-120 Hz (distortion generates lots of low-end mud)</li>\n<li>Cut 400-600 Hz, -3 dB (reduce thickness)</li>\n<li>LPF at 10-12 kHz (tame fizz)</li>\n</ul>\n<hr>\n<p><strong>BASS GUITAR:</strong></p>\n<p><strong>Goal:</strong> Powerful but tight, doesn&#39;t muddy the mix</p>\n<p><strong>PROBLEMS TO FIX:</strong></p>\n<p><strong>Floppy, Undefined Bass:</strong></p>\n<ul>\n<li><strong>Cut:</strong> 60-80 Hz, Q=1, -2 to -4 dB (tightens low end)</li>\n<li><strong>Boost:</strong> 80-100 Hz, Q=1, +2 to +4 dB (adds punch)</li>\n</ul>\n<p><strong>Muddy Bass:</strong></p>\n<ul>\n<li><strong>Cut:</strong> 200-400 Hz, Q=1.5, -3 to -5 dB</li>\n</ul>\n<p><strong>ENHANCEMENTS:</strong></p>\n<p><strong>Add Attack (Hear the Notes):</strong></p>\n<ul>\n<li><strong>Boost:</strong> 800-1,200 Hz, Q=1.5, +2 to +4 dB (finger attack)</li>\n<li><strong>Boost:</strong> 2-3 kHz, Q=2, +2 dB (pick/slap attack)</li>\n</ul>\n<p><strong>STARTING BASS EQ:</strong></p>\n<ol>\n<li>HPF at 30-40 Hz (remove sub-rumble)</li>\n<li>Boost 80 Hz, +3 dB (add punch)</li>\n<li>Cut 200 Hz, -3 dB (reduce mud)</li>\n<li>Boost 800 Hz, +2 dB (add definition)</li>\n<li>LPF at 8 kHz (no useful information above)</li>\n</ol>\n<hr>\n<p><strong>KICK DRUM:</strong></p>\n<p><strong>Goal:</strong> Punchy low end that doesn&#39;t conflict with bass</p>\n<p><strong>Boost 60-80 Hz:</strong> +3 to +6 dB (deep thump)\n<strong>Cut 200-400 Hz:</strong> -3 to -5 dB (remove boxiness)\n<strong>Boost 3-5 kHz:</strong> +2 to +4 dB (beater click/attack)</p>\n<hr>\n<p><strong>SNARE DRUM:</strong></p>\n<p><strong>Goal:</strong> Crack and body without boxiness</p>\n<p><strong>Boost 200 Hz:</strong> +2 dB (body)\n<strong>Cut 400-600 Hz:</strong> -3 dB (remove boxiness)\n<strong>Boost 3-5 kHz:</strong> +3 to +5 dB (snap/crack)</p>\n<hr>\n<h4 id=\"part-d-eq-workflow-and-techniques\">PART D: EQ Workflow and Techniques</h4>\n<p><strong>THE PROFESSIONAL EQ PROCESS:</strong></p>\n<p><strong>STEP 1: SUBTRACT (Fix Problems First)</strong></p>\n<p><strong>The Sweep Technique:</strong></p>\n<ol>\n<li>Create a narrow-Q boost (+10 dB, Q=8)</li>\n<li>Sweep through frequencies (slowly drag frequency slider)</li>\n<li>Listen for harsh/ugly/boxy frequencies that jump out</li>\n<li>When you find one, switch to a cut (-3 to -6 dB)</li>\n<li>Adjust Q to taste (wider = more natural)</li>\n<li>Repeat across the spectrum</li>\n</ol>\n<p><strong>This finds problem frequencies scientifically.</strong></p>\n<hr>\n<p><strong>STEP 2: HIGH-PASS EVERYTHING (Except Bass/Kick)</strong></p>\n<p>Go through every track and add HPF:</p>\n<ul>\n<li>Vocals: 80 Hz</li>\n<li>Acoustic guitar: 80 Hz</li>\n<li>Electric guitar: 100-120 Hz</li>\n<li>Snare: 80 Hz</li>\n<li>Hi-hats/cymbals: 300-500 Hz</li>\n<li>Keys/synths: 100 Hz (unless they&#39;re bass synths)</li>\n</ul>\n<p><strong>Why?</strong> Removes mud and makes room for bass and kick to dominate the low end.</p>\n<hr>\n<p><strong>STEP 3: ADD (Enhance Character)</strong></p>\n<p>Now boost:</p>\n<ul>\n<li>Presence on vocals (3-5 kHz)</li>\n<li>Air on vocals and acoustic instruments (10+ kHz)</li>\n<li>Attack on percussive instruments (3-5 kHz)</li>\n<li>Body where needed (100-300 Hz)</li>\n</ul>\n<p><strong>Remember:</strong> Small boosts (1-3 dB) are usually enough.</p>\n<hr>\n<p><strong>STEP 4: CHECK IN CONTEXT</strong></p>\n<p><strong>Solo&#39;d EQ can sound great but might not work in the mix.</strong></p>\n<ul>\n<li>EQ with all tracks playing (or at least with key elements)</li>\n<li>Ask: &quot;Does this help the mix or just make this track sound cool alone?&quot;</li>\n</ul>\n<hr>\n<p><strong>THE MASKING CONCEPT:</strong></p>\n<p><strong>Masking = when two sounds occupy the same frequency range and fight for space.</strong></p>\n<p><strong>Example:</strong></p>\n<ul>\n<li>Bass guitar and kick drum both live around 60-100 Hz</li>\n<li>They mask each other (you can&#39;t hear both clearly)</li>\n</ul>\n<p><strong>Solution:</strong></p>\n<ul>\n<li>Boost kick at 80 Hz, cut bass at 80 Hz</li>\n<li>Boost bass at 100 Hz, cut kick at 100 Hz</li>\n<li>They now &quot;interlock&quot; and both are clear</li>\n</ul>\n<p><strong>This is called complementary EQ.</strong></p>\n<hr>\n<p><strong>EQ MOVES FOR SEPARATION:</strong></p>\n<p><strong>Guitars vs. Vocals:</strong></p>\n<ul>\n<li>Cut guitars at 2-4 kHz (vocal presence range)</li>\n<li>Boost vocals at 2-4 kHz</li>\n<li>Result: Vocals sit on top of guitars</li>\n</ul>\n<p><strong>Bass vs. Kick:</strong></p>\n<ul>\n<li>Kick gets 60-80 Hz</li>\n<li>Bass gets 80-120 Hz</li>\n<li>Or vice versa (song-dependent)</li>\n</ul>\n<p><strong>Multiple Guitars:</strong></p>\n<ul>\n<li>Guitar 1: Cut 500 Hz</li>\n<li>Guitar 2: Cut 1 kHz</li>\n<li>Each guitar has its own &quot;pocket&quot;</li>\n</ul>\n<hr>\n<h4 id=\"part-e-project---cover-song-with-intentional-eq\">PART E: Project - Cover Song with Intentional EQ</h4>\n<p><strong>PROJECT: Record and Mix a Cover with Professional EQ</strong></p>\n<p><strong>Song Suggestion:</strong> &quot;Blackbird&quot; by The Beatles, &quot;Hallelujah&quot; by Jeff Buckley, or &quot;The Scientist&quot; by Coldplay</p>\n<p><strong>STEP 1: Record Tracks</strong></p>\n<ul>\n<li>Acoustic guitar</li>\n<li>Lead vocal</li>\n<li>Harmony vocal (optional)</li>\n<li>Bass line (optional - can play on low strings of guitar)</li>\n</ul>\n<p><strong>STEP 2: EQ Each Track Using Everything You Learned</strong></p>\n<p><strong>Guitar Track:</strong></p>\n<ol>\n<li>HPF at 80 Hz</li>\n<li>Sweep for harsh frequencies, cut if found</li>\n<li>Cut 300 Hz, -3 dB (reduce mud)</li>\n<li>Boost 10 kHz, +2 dB shelf (add shimmer)</li>\n</ol>\n<p><strong>Lead Vocal:</strong></p>\n<ol>\n<li>HPF at 80 Hz</li>\n<li>Sweep for nasality (800-1,200 Hz), cut if found</li>\n<li>Cut 250 Hz, -3 dB (reduce boxiness)</li>\n<li>Boost 3 kHz, +2 dB (add presence)</li>\n<li>Shelf boost 10 kHz, +1.5 dB (add air)</li>\n</ol>\n<p><strong>Harmony Vocal:</strong></p>\n<ol>\n<li>Same as lead vocal, but:</li>\n<li>Cut 2-4 kHz slightly more (make room for lead vocal)</li>\n<li>Pan left and right (we&#39;ll cover panning more in Lesson 4)</li>\n</ol>\n<p><strong>STEP 3: Check for Masking</strong></p>\n<ul>\n<li>Listen to guitar + vocal together</li>\n<li>Does vocal sit on top clearly?</li>\n<li>If not, cut guitar at 2-4 kHz more</li>\n</ul>\n<p><strong>STEP 4: Bypass EQs and Compare</strong></p>\n<ul>\n<li>Turn all EQs off</li>\n<li>Listen</li>\n<li>Turn them back on</li>\n<li><strong>The mix should sound clearer, more separated, more professional</strong></li>\n</ul>\n<p><strong>STEP 5: Export</strong></p>\n<ul>\n<li>Name: &quot;[SongName]_Cover_EQ_Mix_v1.wav&quot;</li>\n</ul>\n<hr>\n<p><strong>WHAT YOU LEARNED:</strong></p>\n<p>✅ Deep understanding of frequency spectrum\n✅ How EQ filters work (HPF, LPF, Bell, Shelf)\n✅ Q-factor and bandwidth\n✅ Cut to fix, boost to enhance\n✅ EQ strategies for vocals, guitars, bass\n✅ Masking and complementary EQ\n✅ Professional EQ workflow\n✅ Creating separation and clarity in a mix</p>\n<p><strong>This song should sound SIGNIFICANTLY better than previous lessons - clearer, more defined, more professional.</strong></p>\n<hr>\n<p><strong>MEASURING SUCCESS:</strong></p>\n<ul>\n<li>✅ Understand frequency spectrum and what each range does</li>\n<li>✅ Use sweep technique to find problem frequencies</li>\n<li>✅ High-pass filter every non-bass track</li>\n<li>✅ Apply complementary EQ to prevent masking</li>\n<li>✅ Mix sounds clear and separated (not muddy or harsh)</li>\n</ul>\n<p><strong>NEW SKILL ACQUIRED:</strong> Professional EQ theory and application</p>\n<p><strong>🎵 Songs to Practice With</strong></p>\n<ul>\n<li><strong>Hotel California — Eagles</strong> — Layered guitars that demand careful EQ carving to keep each distinct.</li>\n<li><strong>Creep — Radiohead</strong> — Soft verse to loud chorus — practice EQ that holds both extremes.</li>\n</ul>\n<hr>\n<h3 id=\"lesson-4-understanding-compression---controlling-dynamics\">Lesson 4: Understanding Compression - Controlling Dynamics</h3>\n<p><strong>Goal:</strong> Master compression (the most powerful mixing tool)\n<strong>Project:</strong> Record a cover song with dynamic, punchy, professional-sounding compression</p>\n<h4 id=\"part-a-what-is-compression-the-physics-and-purpose\">PART A: What is Compression? The Physics and Purpose</h4>\n<p><strong>COMPRESSION = Automatic volume control that reduces the dynamic range</strong></p>\n<p><strong>Dynamic Range</strong> = the difference between the loudest and quietest parts of a signal</p>\n<p><strong>Why Compression Matters:</strong></p>\n<p>Uncompressed audio has huge dynamic range:</p>\n<ul>\n<li>Whispered vocal: -40 dB</li>\n<li>Loud sung note: -10 dB</li>\n<li>Range: 30 dB difference</li>\n</ul>\n<p><strong>Problems:</strong></p>\n<ul>\n<li>Quiet parts get lost in the mix</li>\n<li>Loud parts are too loud</li>\n<li>Inconsistent volume is distracting</li>\n</ul>\n<p><strong>Compression solution:</strong></p>\n<ul>\n<li>Makes loud parts quieter</li>\n<li>Makes quiet parts louder (via makeup gain)</li>\n<li>Creates consistent, controlled performance</li>\n</ul>\n<hr>\n<p><strong>HOW COMPRESSION ACTUALLY WORKS:</strong></p>\n<p><strong>The Signal Flow:</strong></p>\n<pre><code>Input Signal → Compressor → Output Signal\n\n[Loud peaks exceed threshold] →\n[Compressor reduces gain according to ratio] →\n[More consistent level]\n</code></pre>\n<p><strong>Compressor Parameters Explained:</strong></p>\n<hr>\n<p><strong>1. THRESHOLD</strong></p>\n<p><strong>What it is:</strong> The volume level at which compression starts</p>\n<p><strong>Measured in:</strong> dB (usually negative, like -20 dB)</p>\n<p><strong>How it works:</strong></p>\n<ul>\n<li>Audio below threshold: Unaffected (passes through)</li>\n<li>Audio above threshold: Compressed (gain reduced)</li>\n</ul>\n<p><strong>Example:</strong></p>\n<ul>\n<li>Threshold set to -20 dB</li>\n<li>Audio peaks at -10 dB (10 dB over threshold)</li>\n<li>Compressor engages and reduces volume</li>\n</ul>\n<p><strong>Setting Threshold:</strong></p>\n<ul>\n<li>Lower threshold = more compression (affects more of the signal)</li>\n<li>Higher threshold = less compression (only affects loudest peaks)</li>\n</ul>\n<hr>\n<p><strong>2. RATIO</strong></p>\n<p><strong>What it is:</strong> How much gain reduction is applied to audio above the threshold</p>\n<p><strong>Measured in:</strong> Ratio (2:1, 4:1, 10:1, ∞:1)</p>\n<p><strong>How it works:</strong></p>\n<p><strong>Understanding Ratios:</strong></p>\n<ul>\n<li><strong>2:1:</strong> For every 2 dB over threshold, only 1 dB comes out<ul>\n<li>Signal goes 6 dB over threshold → Only 3 dB over in output → 3 dB of gain reduction</li>\n</ul>\n</li>\n<li><strong>4:1:</strong> For every 4 dB over threshold, only 1 dB comes out<ul>\n<li>Signal goes 8 dB over threshold → Only 2 dB over in output → 6 dB of gain reduction</li>\n</ul>\n</li>\n<li><strong>10:1:</strong> For every 10 dB over threshold, only 1 dB comes out (heavy compression)</li>\n<li><strong>∞:1 (Infinity):</strong> Nothing passes above threshold (this is a limiter)</li>\n</ul>\n<p><strong>Visual:</strong></p>\n<pre><code>Input (dB over threshold)\n  │\n  │                           /  (Uncompressed - 1:1)\n10│                         /\n  │                    /  (2:1 Ratio)\n  │               /\n5 │          / (4:1 Ratio)\n  │      /\n  │  / (10:1 Ratio)\n  │/\n──┴────────────────────────  Output\n  0    5    10   15\n</code></pre>\n<p><strong>Ratio Guidelines:</strong></p>\n<p><strong>Gentle Compression:</strong></p>\n<ul>\n<li><strong>1.5:1 to 2:1:</strong> Subtle, transparent, natural</li>\n<li><strong>Use on:</strong> Master bus, acoustic instruments, entire mixes</li>\n</ul>\n<p><strong>Moderate Compression:</strong></p>\n<ul>\n<li><strong>3:1 to 4:1:</strong> Noticeable but musical</li>\n<li><strong>Use on:</strong> Vocals, bass, most individual tracks</li>\n</ul>\n<p><strong>Heavy Compression:</strong></p>\n<ul>\n<li><strong>6:1 to 10:1:</strong> Obvious, aggressive, controlling</li>\n<li><strong>Use on:</strong> Drums, special effects, pumping effects</li>\n</ul>\n<p><strong>Limiting:</strong></p>\n<ul>\n<li><strong>∞:1 (Infinity):</strong> Hard ceiling, nothing passes</li>\n<li><strong>Use on:</strong> Master bus (final limiting), peak control</li>\n</ul>\n<hr>\n<p><strong>3. ATTACK TIME</strong></p>\n<p><strong>What it is:</strong> How quickly the compressor responds after the threshold is exceeded</p>\n<p><strong>Measured in:</strong> Milliseconds (ms) or microseconds (µs)</p>\n<p><strong>How it works:</strong></p>\n<p><strong>Fast Attack (0.1-10 ms):</strong></p>\n<ul>\n<li>Compressor grabs the signal immediately</li>\n<li>Catches transients (initial attack of notes)</li>\n<li><strong>Effect:</strong> Softens attack, reduces punch</li>\n<li><strong>Use on:</strong> Taming harsh picks, smoothing aggressive vocals</li>\n</ul>\n<p><strong>Medium Attack (10-30 ms):</strong></p>\n<ul>\n<li>Allows some transient through, then compresses body</li>\n<li>Balanced approach</li>\n<li><strong>Use on:</strong> Most vocals, general mixing</li>\n</ul>\n<p><strong>Slow Attack (30-100+ ms):</strong></p>\n<ul>\n<li>Lets transient pass completely unaffected</li>\n<li>Only compresses the sustain/body of the note</li>\n<li><strong>Effect:</strong> Emphasizes transients, adds punch</li>\n<li><strong>Use on:</strong> Drums (to preserve punch), percussion, when you want attack</li>\n</ul>\n<p><strong>The Transient:</strong></p>\n<pre><code>Volume\n  │    ╱─╲  ← Transient (initial attack)\n  │  ╱     ╲_____  ← Sustain/Body\n  │╱\n──┴────────────────────  Time →\n</code></pre>\n<p><strong>Fast attack:</strong> Compresses the entire waveform (softens transient)\n<strong>Slow attack:</strong> Lets transient through (preserves punch)</p>\n<hr>\n<p><strong>4. RELEASE TIME</strong></p>\n<p><strong>What it is:</strong> How quickly the compressor stops compressing after the signal drops below threshold</p>\n<p><strong>Measured in:</strong> Milliseconds (ms) or seconds (s)</p>\n<p><strong>How it works:</strong></p>\n<p><strong>Fast Release (50-150 ms):</strong></p>\n<ul>\n<li>Compressor stops quickly</li>\n<li>Gain returns to normal fast</li>\n<li><strong>Effect:</strong> Tracks fast volume changes, can sound natural or pumpy</li>\n<li><strong>Use on:</strong> Fast material, when you want the compressor to breathe</li>\n</ul>\n<p><strong>Medium Release (150-300 ms):</strong></p>\n<ul>\n<li>Balanced, musical</li>\n<li><strong>Use on:</strong> Most vocals, general purpose</li>\n</ul>\n<p><strong>Slow Release (300 ms - 2 seconds):</strong></p>\n<ul>\n<li>Compressor holds gain reduction longer</li>\n<li>Smooths out volume over time</li>\n<li><strong>Effect:</strong> Glues material together, can sound smeared if too slow</li>\n<li><strong>Use on:</strong> Master bus, when you want &quot;glue&quot;</li>\n</ul>\n<p><strong>Auto Release:</strong></p>\n<ul>\n<li>Compressor automatically adjusts release based on input signal</li>\n<li>Often sounds most natural</li>\n</ul>\n<hr>\n<p><strong>5. KNEE</strong></p>\n<p><strong>What it is:</strong> How gradually compression is applied at the threshold</p>\n<p><strong>Types:</strong></p>\n<p><strong>Hard Knee:</strong></p>\n<ul>\n<li>Compression kicks in abruptly at threshold</li>\n<li>More obvious, precise</li>\n<li>Used for aggressive compression</li>\n</ul>\n<p><strong>Soft Knee:</strong></p>\n<ul>\n<li>Compression gradually increases as you approach and cross threshold</li>\n<li>More transparent, musical</li>\n<li>Used for subtle compression</li>\n</ul>\n<p><strong>Visual:</strong></p>\n<pre><code>Output\n  │\n  │     /──────────  (Hard Knee - sudden compression)\n  │   /\n  │ ╱\n──┴──────────────────  Input\n\nOutput\n  │\n  │     ,─────────  (Soft Knee - gradual compression)\n  │   ,&#39;\n  │ ,&#39;\n──┴──────────────────  Input\n</code></pre>\n<hr>\n<p><strong>6. MAKEUP GAIN</strong></p>\n<p><strong>What it is:</strong> Volume boost applied after compression to bring the level back up</p>\n<p><strong>Why it&#39;s needed:</strong></p>\n<ul>\n<li>Compression reduces overall volume</li>\n<li>Makeup gain compensates</li>\n<li>Allows you to compare compressed vs. uncompressed at the same perceived loudness</li>\n</ul>\n<p><strong>How to set it:</strong></p>\n<ul>\n<li>Check how much gain reduction is happening (GR meter shows this)</li>\n<li>Add roughly the same amount of makeup gain</li>\n<li>Example: 6 dB of gain reduction → Add ~6 dB makeup gain</li>\n</ul>\n<p><strong>Critical:</strong> When comparing bypassed vs. compressed, make sure both are the SAME LOUDNESS. Humans perceive louder as &quot;better,&quot; which is misleading.</p>\n<p><strong>🎵 Songs to Practice With</strong></p>\n<ul>\n<li><strong>Billie Jean — Michael Jackson</strong> — Famously controlled, punchy dynamics — a compression masterclass.</li>\n<li><strong>Rolling in the Deep — Adele</strong> — Vocal compression that stays upfront and consistent.</li>\n</ul>\n<hr>\n<h4 id=\"part-b-types-of-compressors-and-their-character\">PART B: Types of Compressors and Their Character</h4>\n<p><strong>Compressors aren&#39;t just tools - they have COLOR and CHARACTER</strong></p>\n<p>Different compressor designs sound different, even with identical settings.</p>\n<hr>\n<p><strong>VCA COMPRESSOR</strong></p>\n<p><strong>Design:</strong> Voltage Controlled Amplifier (solid-state circuit)</p>\n<p><strong>Character:</strong></p>\n<ul>\n<li>Fast, precise, transparent</li>\n<li>Clean, modern sound</li>\n<li>Tight low-end control</li>\n</ul>\n<p><strong>Famous Hardware:</strong></p>\n<ul>\n<li>SSL Bus Compressor (glues mixes together)</li>\n<li>API 2500</li>\n<li>DBX 160</li>\n</ul>\n<p><strong>Use on:</strong></p>\n<ul>\n<li>Master bus (SSL-style glue)</li>\n<li>Drums (tight, punchy)</li>\n<li>Bass (fast attack catches transients)</li>\n</ul>\n<p><strong>Plugin Emulations:</strong></p>\n<ul>\n<li>Waves SSL G-Master Buss Compressor</li>\n<li>Cytomic The Glue</li>\n</ul>\n<hr>\n<p><strong>FET COMPRESSOR</strong></p>\n<p><strong>Design:</strong> Field Effect Transistor (aggressive, fast solid-state)</p>\n<p><strong>Character:</strong></p>\n<ul>\n<li>Very fast attack (can catch even quickest transients)</li>\n<li>Aggressive, colorful</li>\n<li>Adds harmonics and &quot;attitude&quot;</li>\n<li>Can distort pleasantly when pushed hard</li>\n</ul>\n<p><strong>Famous Hardware:</strong></p>\n<ul>\n<li>Universal Audio 1176 (most famous compressor ever)</li>\n<li>Empirical Labs Distressor</li>\n</ul>\n<p><strong>Use on:</strong></p>\n<ul>\n<li>Vocals (especially aggressive rock vocals)</li>\n<li>Drums (for smash and attitude)</li>\n<li>Bass (for aggression)</li>\n<li>Anything you want to sound &quot;in your face&quot;</li>\n</ul>\n<p><strong>Plugin Emulations:</strong></p>\n<ul>\n<li>Universal Audio 1176 (UAD version is most accurate)</li>\n<li>Waves CLA-76</li>\n</ul>\n<p><strong>1176 Trick - &quot;All Buttons In&quot;:</strong></p>\n<ul>\n<li>The 1176 has ratio buttons (4:1, 8:1, 12:1, 20:1)</li>\n<li>Push ALL of them in at once (not supposed to, but works)</li>\n<li>Creates crazy, aggressive, pumping compression</li>\n<li>Used on drums for huge, slamming sound</li>\n</ul>\n<hr>\n<p><strong>OPTO COMPRESSOR</strong></p>\n<p><strong>Design:</strong> Optical (light-dependent resistor)</p>\n<p><strong>Character:</strong></p>\n<ul>\n<li>Slowest attack of all types</li>\n<li>Smooth, transparent, musical</li>\n<li>&quot;Invisible&quot; compression</li>\n<li>Warm, vintage vibe</li>\n</ul>\n<p><strong>Famous Hardware:</strong></p>\n<ul>\n<li>LA-2A (legendary on vocals)</li>\n<li>LA-3A</li>\n</ul>\n<p><strong>Use on:</strong></p>\n<ul>\n<li>Vocals (smooth, even, no harshness)</li>\n<li>Bass (transparent control)</li>\n<li>Acoustic instruments</li>\n<li>Anything you want controlled but not obviously compressed</li>\n</ul>\n<p><strong>Plugin Emulations:</strong></p>\n<ul>\n<li>Universal Audio LA-2A</li>\n<li>Waves CLA-2A</li>\n</ul>\n<p><strong>LA-2A Characteristics:</strong></p>\n<ul>\n<li>Only two controls: Peak Reduction (threshold) and Gain</li>\n<li>No attack/release controls (they&#39;re fixed based on optical circuit)</li>\n<li>Almost impossible to make sound bad</li>\n<li>Perfect for beginners</li>\n</ul>\n<hr>\n<p><strong>TUBE/VARIABLE-MU COMPRESSOR</strong></p>\n<p><strong>Design:</strong> Vacuum tube circuit</p>\n<p><strong>Character:</strong></p>\n<ul>\n<li>Slow, smooth, musical</li>\n<li>Adds warmth and harmonic richness</li>\n<li>Glues mix together</li>\n<li>Vintage, expensive sound</li>\n</ul>\n<p><strong>Famous Hardware:</strong></p>\n<ul>\n<li>Fairchild 670 (most expensive compressor - $30,000+)</li>\n<li>Manley Variable Mu</li>\n</ul>\n<p><strong>Use on:</strong></p>\n<ul>\n<li>Master bus (ultimate glue)</li>\n<li>Vocals (warmth and richness)</li>\n<li>Mix bus (cohesive, expensive sound)</li>\n</ul>\n<p><strong>Plugin Emulations:</strong></p>\n<ul>\n<li>Universal Audio Fairchild 670</li>\n<li>Waves PuigChild 670</li>\n</ul>\n<hr>\n<p><strong>MULTIBAND COMPRESSOR</strong></p>\n<p><strong>Design:</strong> Splits signal into multiple frequency bands, compresses each independently</p>\n<p><strong>Character:</strong></p>\n<ul>\n<li>Surgical control</li>\n<li>Can brighten without making louder (compress lows, leave highs)</li>\n<li>Complex, can sound unnatural if overused</li>\n</ul>\n<p><strong>Use on:</strong></p>\n<ul>\n<li>Mastering</li>\n<li>Problem solving (e.g., controlling boominess without affecting highs)</li>\n<li>Bass (control sub without losing attack)</li>\n</ul>\n<p><strong>Popular Plugins:</strong></p>\n<ul>\n<li>FabFilter Pro-MB</li>\n<li>Waves C6</li>\n</ul>\n<hr>\n<h4 id=\"part-c-compression-strategies-for-common-instruments\">PART C: Compression Strategies for Common Instruments</h4>\n<p><strong>VOCALS - The Most Critical:</strong></p>\n<p><strong>Goal:</strong> Consistent level, present, sits perfectly in mix</p>\n<p><strong>Stage 1: Control Dynamics (FET or Opto)</strong></p>\n<p><strong>Settings:</strong></p>\n<ul>\n<li><strong>Ratio:</strong> 3:1 to 4:1</li>\n<li><strong>Threshold:</strong> Set so you get 4-8 dB of gain reduction on the loudest parts</li>\n<li><strong>Attack:</strong> Medium (10-20 ms) - fast enough to catch most but allows some transient</li>\n<li><strong>Release:</strong> Auto or 150-300 ms</li>\n<li><strong>Makeup Gain:</strong> Match gain reduction amount</li>\n</ul>\n<p><strong>Why:</strong> Evens out vocal performance, prevents quiet parts from disappearing</p>\n<hr>\n<p><strong>Stage 2: Add Glue (Optional - VCA or Opto)</strong></p>\n<p>After the first compressor, add a second:</p>\n<p><strong>Settings:</strong></p>\n<ul>\n<li><strong>Ratio:</strong> 2:1 to 3:1 (gentler)</li>\n<li><strong>Threshold:</strong> Set so you get 2-3 dB of gain reduction</li>\n<li><strong>Attack:</strong> Slow (30+ ms)</li>\n<li><strong>Release:</strong> Auto or slow</li>\n</ul>\n<p><strong>Why:</strong> &quot;Glues&quot; the vocal to the track, sounds more cohesive</p>\n<p><strong>This is called serial compression</strong> (two compressors in series, each doing less work = more natural sound than one compressor doing all the work)</p>\n<hr>\n<p><strong>ACOUSTIC GUITAR:</strong></p>\n<p><strong>Goal:</strong> Even strumming, controlled dynamics, doesn&#39;t jump out or disappear</p>\n<p><strong>Settings:</strong></p>\n<ul>\n<li><strong>Ratio:</strong> 2:1 to 3:1 (gentle)</li>\n<li><strong>Threshold:</strong> 3-5 dB gain reduction</li>\n<li><strong>Attack:</strong> Medium to slow (20-40 ms) - preserve string attack</li>\n<li><strong>Release:</strong> Auto or medium (200 ms)</li>\n<li><strong>Compressor Type:</strong> Opto (transparent, smooth)</li>\n</ul>\n<hr>\n<p><strong>ELECTRIC GUITAR:</strong></p>\n<p><strong>Clean/Rhythm:</strong></p>\n<ul>\n<li><strong>Ratio:</strong> 2:1 to 3:1</li>\n<li><strong>Threshold:</strong> 3-6 dB gain reduction</li>\n<li><strong>Attack:</strong> Medium (15-25 ms)</li>\n<li><strong>Release:</strong> Medium</li>\n<li><strong>Type:</strong> FET for attitude, VCA for transparency</li>\n</ul>\n<p><strong>Lead Guitar:</strong></p>\n<ul>\n<li><strong>Ratio:</strong> 4:1 to 6:1 (more aggressive - you want sustain)</li>\n<li><strong>Threshold:</strong> 6-10 dB gain reduction</li>\n<li><strong>Attack:</strong> Fast to medium (5-15 ms) - catch every note</li>\n<li><strong>Release:</strong> Medium to fast (100-200 ms) - tracks the playing</li>\n<li><strong>Type:</strong> FET for aggression</li>\n</ul>\n<hr>\n<p><strong>BASS GUITAR:</strong></p>\n<p><strong>Goal:</strong> Even, consistent, tight low end that locks with kick</p>\n<p><strong>Settings:</strong></p>\n<ul>\n<li><strong>Ratio:</strong> 4:1 to 6:1 (bass needs heavy compression)</li>\n<li><strong>Threshold:</strong> 6-10 dB gain reduction</li>\n<li><strong>Attack:</strong> Fast (1-5 ms) to catch transients OR slow (30 ms) to preserve attack (depends on style)</li>\n<li><strong>Release:</strong> M
